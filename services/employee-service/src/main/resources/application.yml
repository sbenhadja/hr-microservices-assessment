server:
  port: 8081

spring:
  application:
    name: employee
  
  datasource:
    url: jdbc:postgresql://hr-db:5432/hrdb
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        default_schema: hr_employee
        
  flyway:
    enabled: true
    baseline-on-migrate: true   
    locations: classpath:db/migration
    schemas: hr_employee
    
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

  metrics:
    export:
      prometheus:
        enabled: true

otel:
  service:
    name: employee-service

  exporter:
    otlp:
      endpoint: http://tempo:4317

  traces:
    exporter: otlp

  metrics:
    exporter: none

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    io.micrometer: INFO
    io.opentelemetry: INFO